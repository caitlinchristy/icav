# CI pipeline: lint, test, build, and conditional deploy to main/development

stages:
  - setup
  - lint
  - test
  - build
  - deploy

# -----------------------
# Frontend: setup, lint, test
# -----------------------
frontend-setup:
  stage: setup
  image: node:18
  cache:
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
  rules:
    - when: always

frontend-lint:
  stage: lint
  image: node:18
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
    - npm run lint --if-present
  rules:
    - when: always

frontend-test:
  stage: test
  image: node:18
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
    - npm test --if-present --silent
  artifacts:
    when: always
    reports:
      junit: frontend/test-results/*.xml
    paths:
      - frontend/coverage/
  rules:
    - when: always

# -----------------------
# Backend: lint, test, build
# -----------------------
backend-lint:
  stage: lint
  image: gradle:8-jdk17
  script:
    - cd backend
    - ./gradlew check
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - backend/.gradle/
  rules:
    - when: always

backend-test:
  stage: test
  image: gradle:8-jdk17
  script:
    - cd backend
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
    paths:
      - backend/build/test-results/
      - backend/build/reports/tests/
  rules:
    - when: always

backend-build:
  stage: build
  image: gradle:8-jdk17
  script:
    - cd backend
    - ./gradlew clean bootJar
  artifacts:
    paths:
      - backend/build/libs/*.jar
  rules:
    - when: always

# -----------------------
# Docker image build & push
# -----------------------
docker-build-push:
  stage: deploy
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Logging into GitLab container registry"
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - echo "Building backend image"
    - docker build -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA ./backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - echo "Building frontend image"
    - docker build -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "development"'
      when: on_success
  allow_failure: false

# -----------------------
# Remote deploy (optional, requires SSH vars)
# -----------------------
remote-deploy:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache openssh-client
  script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cd $DEPLOY_PATH && docker compose pull && docker compose up -d --build"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "development"'
      when: on_success
  allow_failure: true
  environment:
    name: production
    url: $DEPLOY_URL

# -----------------------
# Notes
# -----------------------
# - To enable image push, set CI_REGISTRY_USER and CI_REGISTRY_PASSWORD in CI/CD variables.
# - To enable remote deploy, set SSH_PRIVATE_KEY, SSH_USER, SSH_HOST and DEPLOY_PATH variables.
# - The remote deploy job is optional and marked allow_failure: true so pipelines won't fail if not configured.


